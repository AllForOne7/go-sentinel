<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --border: rgba(255,255,255,.06);
    --border-hover: rgba(255,255,255,.12);
    --text: #e4e4e7;
    --text-muted: #71717a;
    --text-dim: #52525b;
    --accent: #818cf8;
    --accent-hover: #6366f1;
    --green: #34d399;
    --red: #f87171;
    --red-bg: rgba(248,113,113,.1);
    --radius: 14px;
    --radius-sm: 10px;
    --transition: .2s cubic-bezier(.4,0,.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background glow */
  body::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(129,140,248,.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(52,211,153,.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .login-card {
    background: var(--bg-card);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 44px 40px;
    width: 400px;
    position: relative;
    box-shadow: 0 4px 40px rgba(0,0,0,.3), 0 0 80px rgba(129,140,248,.04);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 2px 16px rgba(99,102,241,.3);
  }

  .logo-text {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.03em;
    background: linear-gradient(135deg, #e4e4e7, #a1a1aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 32px;
    margin-top: 4px;
  }

  .form-row {
    margin-bottom: 20px;
  }

  .form-row label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .form-row input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    background: rgba(255,255,255,.03);
    color: var(--text);
    transition: all var(--transition);
  }

  .form-row input::placeholder {
    color: var(--text-dim);
  }

  .form-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(129,140,248,.15);
    background: rgba(255,255,255,.05);
  }

  .btn {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: all var(--transition);
    box-shadow: 0 2px 12px rgba(99,102,241,.3);
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(99,102,241,.4);
  }

  .btn:active {
    transform: translateY(0);
  }

  .error {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(248,113,113,.15);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
    display: none;
  }

  .error.show { display: block; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <span class="logo-text">Sentinel</span>
  </div>
  <div class="subtitle">Система мониторинга</div>
  {{if .Error}}
  <div class="error show">{{.Error}}</div>
  {{end}}
  <form method="POST" action="/login">
    <div class="form-row">
      <label>Логин</label>
      <input type="text" name="username" placeholder="admin" autofocus>
    </div>
    <div class="form-row">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="••••••••">
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>
</div>
</body>
</html>
